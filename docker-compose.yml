services:
  mysql:
    image: mysql:8.0
    container_name: ctrl-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - blog-network

  redis:
    image: redis:7-alpine
    container_name: ctrl-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - blog-network

  ctrl-blog-server:
    # 使用阿里云私有仓库的 VPC 地址
    image: crpi-no0f86ik9slq5elj-vpc.cn-hongkong.personal.cr.aliyuncs.com/ctrl-blog/ctrl-blog-server:latest
    container_name: ctrl-backend
    restart: always
    depends_on:
      - mysql
      - redis
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - REDIS_HOST=redis
    networks:
      - blog-network

  ctrl-blog-ui:
    image: crpi-no0f86ik9slq5elj-vpc.cn-hongkong.personal.cr.aliyuncs.com/ctrl-blog/ctrl-blog-ui:latest
    container_name: ctrl-frontend
    restart: always
    depends_on:
      - ctrl-blog-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge